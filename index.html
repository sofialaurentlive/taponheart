<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: manipulation">
    <title>💘 Valentine Heart Tap</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: radial-gradient(circle at 20% 30%, #ff8fb3, #ff4d7a);
            height: 100vh;
            width: 100vw;
            position: fixed;
            touch-action: manipulation;
            cursor: pointer;
        }

        .bg-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-hearts span {
            position: absolute;
            display: block;
            font-size: 30px;
            animation: floatUp 8s linear infinite;
            opacity: 0.15;
            color: white;
            bottom: -60px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.1;
            }
            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0.4;
            }
        }

        #game {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 10;
        }

        #ui {
            position: absolute;
            top: 15px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: clamp(18px, 4vw, 24px);
            font-weight: bold;
            z-index: 100;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        #ui span {
            display: inline-block;
            min-width: 30px;
            text-align: center;
        }

        .clickable {
            position: absolute;
            font-size: 45px;
            cursor: pointer;
            transform: translate(-50%, -50%);
            z-index: 50;
            transition: transform 0.1s ease;
            animation: pulse 1.2s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4));
            pointer-events: auto;
        }

        .clickable:active {
            transform: translate(-50%, -50%) scale(0.85);
        }

        @keyframes pulse {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        .bomb-item {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%,
            100% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            25% {
                transform: translate(-50%, -50%) rotate(5deg);
            }
            75% {
                transform: translate(-50%, -50%) rotate(-5deg);
            }
        }

        .timer-ring {
            position: absolute;
            pointer-events: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            transform: translate(-50%, -50%);
            left: 50%;
            top: 50%;
            z-index: 40;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        #gameOverOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            z-index: 200;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #gameOverOverlay.active {
            display: flex;
        }

        #gameOverCard {
            background: rgba(255, 255, 255, 0.96);
            color: #d63059;
            padding: 20px 28px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            z-index: 210;
            max-width: 90vw;
            animation: cardIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardIn {
            0% {
                transform: scale(0.7) translateY(40px);
                opacity: 0;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        #gameOverCard h2 {
            margin: 0 0 8px;
            font-size: 26px;
        }
        #gameOverCard p {
            margin: 4px 0;
            font-size: 16px;
        }

        #restartBtn {
            margin-top: 14px;
            padding: 10px 30px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background: #ff3366;
            color: white;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(255, 60, 110, 0.5);
            transition: transform 0.15s, box-shadow 0.15s;
            display: none;
            z-index: 215;
        }
        #restartBtn.show {
            display: inline-block;
        }
        #restartBtn:active {
            transform: scale(0.93);
        }

        /* Full‑screen interstitial iframe container */
        #iframeContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 250;
            transform: scale(0);
            transition: transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: white;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7);
        }

        #iframeContainer.popIn {
            transform: scale(1);
        }

        #iframeContainer iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Transparent overlay to catch clicks and close the iframe */
        .iframe-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-hint-text {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>
    <div class="bg-hearts" id="bgHearts"></div>

    <div id="game">
        <div id="ui">
            💘 Score: <span id="score">0</span>
            &nbsp;&nbsp;
            ❤️ Lives: <span id="lives">3</span>
            <br>
            🏆 Best: <span id="best">0</span>
        </div>

        <div id="gameOverOverlay">
            <div id="gameOverCard">
                <h2>Game Over 💔</h2>
                <p>Your score: <span id="finalScore">0</span></p>
            </div>
            <button id="restartBtn">Play Again</button>
        </div>

        <!-- External interstitial iframe with click‑to‑close overlay -->
        <div id="iframeContainer">
            <iframe id="externalIframe" src="" allow="fullscreen"></iframe>
            <div class="iframe-overlay" id="iframeOverlay">
                <div class="close-hint-text">👆 Tap anywhere to close</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const game = document.getElementById("game");
            const scoreEl = document.getElementById("score");
            const livesEl = document.getElementById("lives");
            const bestEl = document.getElementById("best");
            const finalScoreEl = document.getElementById("finalScore");
            const gameOverOverlay = document.getElementById("gameOverOverlay");
            const restartBtn = document.getElementById("restartBtn");
            const iframeContainer = document.getElementById("iframeContainer");
            const externalIframe = document.getElementById("externalIframe");
            const iframeOverlay = document.getElementById("iframeOverlay");
            const bgHeartsContainer = document.getElementById("bgHearts");

            // Create floating background hearts
            function createBgHearts() {
                const count = 18;
                for (let i = 0; i < count; i++) {
                    const span = document.createElement('span');
                    span.innerHTML = ['❤️', '💕', '💖', '💘', '💝'][Math.floor(Math.random() * 5)];
                    span.style.left = Math.random() * 100 + '%';
                    span.style.animationDuration = (6 + Math.random() * 10) + 's';
                    span.style.animationDelay = Math.random() * 8 + 's';
                    span.style.fontSize = (20 + Math.random() * 40) + 'px';
                    bgHeartsContainer.appendChild(span);
                }
            }
            createBgHearts();

            let best = parseInt(localStorage.getItem("valentineTapBest")) || 0;
            bestEl.textContent = best;

            let score = 0;
            let lives = 3;
            let playing = true;
            let activeItems = [];
            const MAX_BOMBS = 2;
            let bombCount = 0;
            const HEART_LIFETIME = 2500;
            const BOMB_LIFETIME = 2200;
            let spawnHeartTimeout, spawnBombTimeout;

            // Flag to prevent multiple iframe closures
            let iframeClosable = false;

            // Audio
            let audioCtx = null;
            function getAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }

            function beep(freq, dur, type = 'sine') {
                try {
                    const ctx = getAudio();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.value = freq;
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
                    osc.start();
                    osc.stop(ctx.currentTime + dur);
                } catch (e) {}
            }

            function removeItem(item) {
                if (!item || !item.el) return;
                clearTimeout(item.timerId);
                if (item.el.parentNode) item.el.remove();
                if (item.type === 'bomb') bombCount = Math.max(0, bombCount - 1);
                const idx = activeItems.indexOf(item);
                if (idx > -1) activeItems.splice(idx, 1);
            }

            function createItem(type) {
                if (!playing) return; // double safety
                const el = document.createElement('div');
                el.className = 'clickable';
                if (type === 'heart') {
                    el.innerHTML = ['❤️', '💖', '💘', '💕', '💝'][Math.floor(Math.random() * 5)];
                } else {
                    el.innerHTML = '💣';
                    el.classList.add('bomb-item');
                }

                const x = 60 + Math.random() * (window.innerWidth - 120);
                const y = 80 + Math.random() * (window.innerHeight - 160);
                el.style.left = x + 'px';
                el.style.top = y + 'px';

                const ring = document.createElement('div');
                ring.className = 'timer-ring';
                el.appendChild(ring);

                const startTime = Date.now();
                const lifetime = type === 'heart' ? HEART_LIFETIME : BOMB_LIFETIME;

                const itemData = {
                    el,
                    type,
                    x,
                    y,
                    startTime,
                    lifetime,
                    timerId: null,
                };

                const updateOpacity = () => {
                    if (!playing || !itemData.el.parentNode) return;
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(1, elapsed / lifetime);
                    el.style.opacity = 1 - progress;
                    ring.style.opacity = 1 - progress;
                    if (progress >= 1) {
                        if (type === 'heart') {
                            lives--;
                            livesEl.textContent = lives;
                            beep(150, 0.2, 'triangle');
                            if (lives <= 0) endGame();
                        }
                        removeItem(itemData);
                    } else {
                        requestAnimationFrame(updateOpacity);
                    }
                };
                requestAnimationFrame(updateOpacity);

                itemData.timerId = setTimeout(() => {
                    if (itemData.el.parentNode) {
                        if (type === 'heart' && playing) {
                            lives--;
                            livesEl.textContent = lives;
                            beep(150, 0.2, 'triangle');
                            if (lives <= 0) endGame();
                        }
                        removeItem(itemData);
                    }
                }, lifetime + 50);

                el.addEventListener('pointerdown', function(e) {
                    e.stopPropagation();
                    e.preventDefault();
                    if (!playing || !itemData.el.parentNode) return;
                    if (type === 'bomb') {
                        beep(80, 0.3, 'sawtooth');
                        endGame();
                        return;
                    }
                    score++;
                    scoreEl.textContent = score;
                    beep(700, 0.07);
                    spawnClickParticles(x, y, '❤️');
                    removeItem(itemData);
                });

                game.appendChild(el);
                activeItems.push(itemData);
                if (type === 'bomb') bombCount++;
            }

            function spawnClickParticles(x, y, emoji) {
                for (let i = 0; i < 6; i++) {
                    const p = document.createElement('div');
                    p.textContent = emoji;
                    p.style.position = 'absolute';
                    p.style.left = x + 'px';
                    p.style.top = y + 'px';
                    p.style.fontSize = '24px';
                    p.style.pointerEvents = 'none';
                    p.style.zIndex = '100';
                    p.style.transform = 'translate(-50%, -50%)';
                    p.style.animation = `particleUp 0.6s ease-out forwards`;
                    game.appendChild(p);
                    setTimeout(() => p.remove(), 700);
                }
            }

            const styleSheet = document.createElement("style");
            styleSheet.textContent = `
                @keyframes particleUp {
                    0% { opacity:1; transform: translate(-50%, -50%) scale(1); }
                    100% { opacity:0; transform: translate(-50%, -80px) scale(0.2); }
                }
            `;
            document.head.appendChild(styleSheet);

            function scheduleHeartSpawn() {
                if (!playing) return;
                const delay = 800 + Math.random() * 1400;
                spawnHeartTimeout = setTimeout(() => {
                    if (!playing) return;
                    createItem('heart');
                    scheduleHeartSpawn();
                }, delay);
            }

            function scheduleBombSpawn() {
                if (!playing) return;
                const delay = 2000 + Math.random() * 3000;
                spawnBombTimeout = setTimeout(() => {
                    if (!playing) return;
                    if (bombCount < MAX_BOMBS) {
                        createItem('bomb');
                    }
                    scheduleBombSpawn();
                }, delay);
            }

            function endGame() {
                if (!playing) return;
                playing = false;

                // Immediately clear all pending spawns
                clearTimeout(spawnHeartTimeout);
                clearTimeout(spawnBombTimeout);
                spawnHeartTimeout = null;
                spawnBombTimeout = null;

                // Remove all active items and their timers
                while (activeItems.length) {
                    const item = activeItems[0];
                    clearTimeout(item.timerId);
                    if (item.el.parentNode) item.el.remove();
                    activeItems.shift();
                }
                bombCount = 0;

                if (score > best) {
                    best = score;
                    localStorage.setItem("valentineTapBest", best);
                    bestEl.textContent = best;
                }
                finalScoreEl.textContent = score;
                gameOverOverlay.classList.add('active');
                restartBtn.classList.remove('show');
                showGameOverIframe();
            }

            function showGameOverIframe() {
                externalIframe.src = 'https://example.com';
                iframeContainer.classList.add('popIn');

                // Prevent accidental immediate close – enable overlay after a short delay
                iframeClosable = false;
                setTimeout(() => {
                    iframeClosable = true;
                }, 300);
            }

            function hideIframe() {
                if (!iframeClosable) return; // ignore clicks during the initial pop‑in delay
                iframeContainer.classList.remove('popIn');
                externalIframe.src = '';
                restartBtn.classList.add('show');
                iframeClosable = false;
            }

            // Overlay tap to close – works on mobile & desktop
            iframeOverlay.addEventListener('pointerdown', function(e) {
                e.preventDefault();
                e.stopPropagation();
                hideIframe();
            });

            // Prevent any other interaction from closing the iframe prematurely
            iframeOverlay.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
            });

            function restartGame() {
                // Clear any leftover items
                while (activeItems.length) {
                    const item = activeItems[0];
                    clearTimeout(item.timerId);
                    if (item.el.parentNode) item.el.remove();
                    activeItems.shift();
                }
                clearTimeout(spawnHeartTimeout);
                clearTimeout(spawnBombTimeout);

                score = 0;
                lives = 3;
                bombCount = 0;
                playing = true;

                scoreEl.textContent = "0";
                livesEl.textContent = "3";
                gameOverOverlay.classList.remove("active");
                restartBtn.classList.remove("show");
                iframeContainer.classList.remove('popIn');
                externalIframe.src = '';
                iframeClosable = false;

                scheduleHeartSpawn();
                scheduleBombSpawn();
            }

            restartBtn.addEventListener('click', restartGame);
            restartBtn.addEventListener('touchend', function(e) {
                e.preventDefault();
                restartGame();
            });

            // Prevent double‑tap zoom on game area
            game.addEventListener('dblclick', e => e.preventDefault());

            // Start the game
            scheduleHeartSpawn();
            scheduleBombSpawn();
        })();
    </script>
</body>
</html>
